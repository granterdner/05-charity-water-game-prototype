<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Water Drop Dodge</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="ui">
  <div id="score">Score: 0</div>
  <div id="lives">♦ ♦ ♦</div>
</div>
<div style="position: relative;">
  <canvas id="gameCanvas" width="320" height="500"></canvas>
  <div id="startOverlay" class="overlay">
    <h1>🌈 Water Drop Dodge 🌈</h1>
    <p>Dodge the colorful obstacles!</p>
    <p>Use ← → keys or buttons below</p>
    <button onclick="startGame()">Start Game</button>
  </div>
  <div id="gameOverOverlay" class="overlay" style="display:none;">
    <h1 style="color:#ff4c4c;">Game Over 😢</h1>
    <p id="finalScore">Score: 0</p>
    <button onclick="startGame()">Play Again</button>
  </div>
</div>
<div id="controls">
  <div class="btn" onclick="moveLeft()">←</div>
  <div class="btn" onclick="moveRight()">→</div>
</div>
<script src="game.js"></script>
</body>
</html>
