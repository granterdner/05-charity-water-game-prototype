<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Water Run</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="phone">

<div id="topbar">
<div id="score">Score: <b>0</b></div>
<div id="lives">Lives: <span id="lifeIcons">❤❤❤</span></div>
</div>

<canvas id="gameCanvas" width="320" height="420"></canvas>

<div id="controls">
<button onclick="moveLeft()">◀</button>
<button onclick="moveRight()">▶</button>
</div>

<div id="startOverlay" class="overlay">
<h1>WATER<br>RUN</h1>
<p class="subtitle">One drop. One life.</p>

<button class="startBtn" onclick="startGame()">Start Game</button>

<p class="note">
Every 10 seconds someone<br>
needs clean water.
</p>
</div>

<div id="gameOverOverlay" class="overlay hidden">
  <h2>Game Over</h2>
  <p id="finalScore"></p>
  <p id="encouragement"></p>
  <button class="startBtn" onclick="startGame()">Play Again</button>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
